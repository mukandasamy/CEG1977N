<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CEG 1977 Batch Golden Jubilee</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family:Arial,Helvetica;
font-size:14px;
margin:15px;
}

header{
display:flex;
flex-wrap:wrap;
align-items:center;
gap:10px;
border-bottom:1px solid #ccc;
padding-bottom:10px;
}

header img{height:70px}

h1{margin:0;font-size:22px}

button{
background:#4a6fa5;
color:white;
border:none;
padding:10px 16px;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:disabled{opacity:.5}

#search{
margin-left:auto;
padding:6px;
font-size:15px;
width:240px;
}

#filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
align-items:center;
}

#tableView{
overflow-x:auto;
}
  
select{
background:#4a6fa5;
color:white;
border:none;
padding:8px;
font-size:16px;
height:36px;
}

#recordCount{margin-left:auto}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

thead{
background:#f1f5f9;
position:sticky;
top:0;
}

.cardGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
gap:14px;
margin-top:14px;
}

.card{
border:1px solid #999;
padding:8px;
}

.cardImages{
display:flex;
gap:6px;
margin-bottom:6px;
}

.footer{
margin-top:12px;
display:none;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.clearBtn{
background:#8b1e3f;
}

.secondaryBtn{
background:#6b7280;
}

.placeholderText{
color:#666;
font-style:italic;
padding:8px 0;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
}

.modalContent{
background:white;
margin:20px auto;
padding:18px;
width:95%;
max-height:90%;
overflow:auto;
line-height:1.8;
}

.closeX{
float:right;
font-size:22px;
cursor:pointer;
}

.galleryGrid{
display:flex;
flex-wrap:wrap;
gap:12px;
align-items:flex-start;
}

.galleryGrid img{
height:auto;
width:auto;
align-self:flex-start;
}

.zoomViewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
align-items:center;
justify-content:center;
}

.zoomViewer img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<header>

<img src="group_pics/college-1.jpeg">

<h1>CEG 1977 Batch Golden Jubilee</h1>

<button onclick="openGallery()">Gallery</button>

<input id="search" placeholder="Search directory">

</header>

<div id="loadingMessage">Loading alumni directory...</div>

<div id="filters" style="display:none">

<select id="branchFilter"></select>
<select id="monthFilter"></select>
<select id="alphaFilter"></select>

<button class="clearBtn" onclick="clearFilters()">Clear Filters</button>

<button id="viewBtn" onclick="toggleView()">Show Card View</button>
<button class="secondaryBtn" onclick="refreshDirectory()">Refresh Data</button>

<div id="recordCount"></div>

</div>

<div id="tableView" style="display:none"></div>
<div id="cardView"></div>

<div id="footerBar" class="footer">

<select id="pageSize">
<option>10</option>
<option>25</option>
<option>50</option>
<option>100</option>
</select>

<button id="prevBtn" onclick="prevPage()">Prev</button>

<span id="pageInfo"></span>

<button id="nextBtn" onclick="nextPage()">Next</button>

</div>

<!-- Modal 1 -->

<div id="modal1" class="modal">
<div class="modalContent">

<span class="closeX" onclick="modal1.style.display='none'">×</span>

<div id="modalImages"></div>

<div id="modalDetails"></div>

<div style="margin-top:12px">

<button id="moreBtn">View More Pictures</button>
<button onclick="modal1.style.display='none'">Close</button>

</div>

</div>
</div>

<!-- Modal 2 -->

<div id="modal2" class="modal">

<div class="modalContent">

<span class="closeX" onclick="modal2.style.display='none'">×</span>

<div id="modal2Images" class="galleryGrid"></div>

<button onclick="modal2.style.display='none'">Close</button>

</div>

</div>

<!-- Gallery -->

<div id="galleryModal" class="modal">

<div class="modalContent">

<span class="closeX" onclick="closeGallery()">×</span>

<h3>Gallery</h3>

<div id="galleryGrid" class="galleryGrid"></div>

<button onclick="closeGallery()">Close</button>

</div>

</div>

<!-- Image Zoom -->

<div id="zoomViewer" class="zoomViewer" onclick="closeZoom()">
<img id="zoomImg">
</div>


<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzScXIj_0DCDACS29_dGGHj8O36vojdCt_cDqdVvCrB4w3rghvhrr-Z571lRRx7nqCD_g/exec"
const CACHE_VERSION = "v2"
const DATA_CACHE_KEY = "ceg1977data_" + CACHE_VERSION
const IMAGE_CACHE_KEY = "ceg1977images_" + CACHE_VERSION
const PLACEHOLDER_IMG = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="260" viewBox="0 0 360 260">
  <rect width="100%" height="100%" fill="#f3f4f6"/>
  <rect x="110" y="50" width="140" height="100" rx="12" fill="#d1d5db"/>
  <circle cx="180" cy="95" r="26" fill="#9ca3af"/>
  <path d="M120 170c18-28 44-42 60-42s42 14 60 42" fill="#9ca3af"/>
  <text x="50%" y="228" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6b7280">Photo not available</text>
</svg>`)

let imageIndex = {
  individual:{},
  group:{}
}

let data=[]
let filtered=[]
let page=1
let cardMode=true

const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

function encodeName(n){return encodeURIComponent(n)}

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;")
}

function formatDOB(v){

  if(!v)return ""

  let d=new Date(v)

  if(isNaN(d))return v

  let dd=("0"+d.getDate()).slice(-2)
  let m=months[d.getMonth()]

  return dd+"-"+m

}

function buildSearchText(record){
  return Object.values(record)
    .filter(v => v !== null && v !== undefined)
    .join(" ")
    .toLowerCase()
}

function normalizeData(rows){
  return rows.map(row => ({
    ...row,
    _searchText: buildSearchText(row)
  }))
}

function showLoadedState(){
  loadingMessage.style.display = "none"
  filters.style.display = "flex"
  footerBar.style.display = "flex"
}

async function loadImageIndex(){
  try{
    let cached = localStorage.getItem(IMAGE_CACHE_KEY)

    if(cached){
      imageIndex = JSON.parse(cached)
      return
    }

    const res = await fetch(API_URL + "?action=images")
    const text = await res.text()
    imageIndex = JSON.parse(text)

    localStorage.setItem(IMAGE_CACHE_KEY, JSON.stringify(imageIndex))
  }catch(e){
    console.error("loadImageIndex failed:", e)
    imageIndex = { individual:{}, group:{} }
  }
}

async function loadData(){

  await loadImageIndex()

  headerImage.src = getGroup("college-1.jpeg") || PLACEHOLDER_IMG
  headerImage.onerror = function(){
    this.onerror = null
    this.src = PLACEHOLDER_IMG
  }

  let cached = localStorage.getItem(DATA_CACHE_KEY)

  if(cached){
    data = normalizeData(JSON.parse(cached))
    filtered = [...data]
    buildFilters()
    showLoadedState()
    render()
    return
  }

  try{
    let res = await fetch(API_URL + "?action=data")
    let fresh = await res.json()

    localStorage.setItem(DATA_CACHE_KEY, JSON.stringify(fresh))

    data = normalizeData(fresh)
    filtered = [...data]

    buildFilters()
    showLoadedState()

    render()
  }catch(e){
    console.error(e)
    loadingMessage.innerText = "Unable to load directory"
  }
}

function refreshDirectory(){
  localStorage.removeItem(DATA_CACHE_KEY)
  localStorage.removeItem(IMAGE_CACHE_KEY)
  location.reload()
}

function scrollToTop(){
  window.scrollTo({top:0, behavior:"smooth"})
}

function buildFilters(){

  let branches=[...new Set(data.map(x=>x.Branch).filter(Boolean))].sort()

  branchFilter.innerHTML="<option value='ALL'>Branch</option>"
  branches.forEach(b=>branchFilter.innerHTML+=`<option>${escapeHtml(b)}</option>`)

  monthFilter.innerHTML="<option value='ALL'>DOB Jan-Dec</option>"
  months.forEach(m=>monthFilter.innerHTML+=`<option>${m}</option>`)

  let letters=[...new Set(data.map(x=>(x.Name||"")[0]?.toUpperCase()).filter(Boolean))].sort()

  alphaFilter.innerHTML="<option value='ALL'>Name A - Z</option>"
  letters.forEach(a=>alphaFilter.innerHTML+=`<option>${escapeHtml(a)}</option>`)

}

function applyFilters(){

  let b=branchFilter.value
  let m=monthFilter.value
  let a=alphaFilter.value
  let s=search.value.toLowerCase().trim()

  filtered=data.filter(d=>{

    let dob=new Date(d.Date_of_birth)
    let mmm=isNaN(dob) ? "" : months[dob.getMonth()]

    if(b!="ALL" && d.Branch!=b) return false
    if(m!="ALL" && mmm!=m) return false
    if(a!="ALL" && (!d.Name || d.Name[0].toUpperCase()!=a)) return false
    if(s && !(d._searchText || "").includes(s)) return false

    return true

  })

  page=1
  render()

}

branchFilter.onchange=applyFilters
monthFilter.onchange=applyFilters
alphaFilter.onchange=applyFilters
search.oninput=applyFilters

function clearFilters(){

  search.value=""
  branchFilter.value="ALL"
  monthFilter.value="ALL"
  alphaFilter.value="ALL"

  filtered=[...data]

  render()

}

function pageSize(){
  return parseInt(document.getElementById("pageSize").options[
    document.getElementById("pageSize").selectedIndex
  ].value)
}

document.getElementById("pageSize").onchange=function(){
  page=1
  render()
  scrollToTop()
}

function paginate(){

  let start=(page-1)*pageSize()

  return filtered.slice(start,start+pageSize())

}

function render(){

  recordCount.innerText=filtered.length+" records"

  viewBtn.innerText = cardMode ? "Show Table View" : "Show Card View"

  if(cardMode)renderCards()
  else renderTable()

  updatePagination()

}

function renderTable(){

  let rows=paginate()

  let html="<table><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead><tbody>"

  rows.forEach((r,i)=>{

    let idx=(page-1)*pageSize()+i

    html+=`
      <tr>
        <td>${escapeHtml(r.Name)}</td>
        <td>${escapeHtml(r.Branch)}</td>
        <td>${escapeHtml(formatDOB(r.Date_of_birth))}</td>
        <td>${escapeHtml(r.Email_address||"")}</td>
        <td>${escapeHtml(r.Phone_numbers||"")}</td>
        <td><button onclick="showDetails(${idx})">View Details</button></td>
      </tr>
    `

  })

  html+="</tbody></table>"

  tableView.innerHTML=html

}

function renderCards(){

  let rows=paginate()

  let html="<div class='cardGrid'>"

  rows.forEach((r,i)=>{

    let idx=(page-1)*pageSize()+i

    let name=encodeName(r.Name)

    html+=`
      <div class="card">
        <div class="cardImages">
          <img loading="lazy" src="${getIndividual(`${name}-1977.jpeg`)}" onclick="zoom(this)" onerror="handleImageError(this)">
          <img loading="lazy" src="${getIndividual(`${name}-2020.jpeg`)}" onclick="zoom(this)" onerror="handleImageError(this)">
          <img loading="lazy" src="${getIndividual(`${name}-2027.jpeg`)}" onclick="zoom(this)" onerror="handleImageError(this)">
        </div>

        <b>${escapeHtml(r.Name)}</b><br>
        ${escapeHtml(r.Branch)}<br>
        ${escapeHtml(formatDOB(r.Date_of_birth))}<br>
        ${escapeHtml(r.Email_address||"")}<br>
        ${escapeHtml(r.Phone_numbers||"")}<br><br>

        <button onclick="showDetails(${idx})">View Details</button>
      </div>
    `

  })

  html+="</div>"

  cardView.innerHTML=html

}

function toggleView(){

  cardMode=!cardMode

  tableView.style.display=cardMode?"none":"block"
  cardView.style.display=cardMode?"block":"none"

  viewBtn.innerText=cardMode?"Show Table View":"Show Card View"

  render()

}

function updatePagination(){

  let total=Math.ceil(filtered.length/pageSize())

  pageInfo.innerText="Page "+page+" / "+(total||1)

  prevBtn.disabled=(page===1)
  nextBtn.disabled=(page===total || total===0)

}

function prevPage(){
  if(page>1){
    page--;
    render();
    scrollToTop();
  }
}

function nextPage(){

  let total=Math.ceil(filtered.length/pageSize())

  if(page<total){
    page++;
    render();
    scrollToTop();
  }

}

function handleImageError(img){
  img.onerror = null
  img.src = PLACEHOLDER_IMG
}

function getIndividual(file){

  if(!imageIndex || !imageIndex.individual) return PLACEHOLDER_IMG

  let decoded = decodeURIComponent(file)
  let id = imageIndex.individual[decoded]

  if(!id) return PLACEHOLDER_IMG

  return "https://drive.google.com/thumbnail?id="+id+"&sz=w800"

}

function getGroup(file){

  if(!imageIndex || !imageIndex.group) return ""

  let decoded = decodeURIComponent(file)
  let id = imageIndex.group[decoded]

  if(!id) return ""

  return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000"

}

function showDetails(i){

  let r = filtered[i]
  let name = encodeName(r.Name)

  modalImages.innerHTML = `
    <img loading="lazy" src="${getIndividual(`${name}-1977.jpeg`)}" onclick="zoom(this)" onerror="handleImageError(this)">
    <img loading="lazy" src="${getIndividual(`${name}-2020.jpeg`)}" onclick="zoom(this)" onerror="handleImageError(this)">
    <img loading="lazy" src="${getIndividual(`${name}-2027.jpeg`)}" onclick="zoom(this)" onerror="handleImageError(this)">
  `

  let html = ""

  for(let k in r){
    if(k === "_searchText") continue
    html += `<b>${escapeHtml(k)}</b>: ${escapeHtml(r[k] || "")}<br>`
  }

  modalDetails.innerHTML = html

  let hasMorePics = false
  let decodedName = decodeURIComponent(name)

  if(imageIndex && imageIndex.group){
    for(let file in imageIndex.group){
      if(file.startsWith(decodedName + "-")){
        hasMorePics = true
        break
      }
    }
  }

  moreBtn.style.display = hasMorePics ? "inline-block" : "none"
  moreBtn.onclick = function(){ openMorePics(name) }

  modal1.style.display = "block"
}

function openMorePics(name){

  let decodedName = decodeURIComponent(name)
  let html = ""

  if(!imageIndex || !imageIndex.group){
    modal2Images.innerHTML = `<div class="placeholderText">No additional pictures available.</div>`
    modal2.style.display = "block"
    return
  }

  let files = Object.keys(imageIndex.group)
    .filter(file => file.startsWith(decodedName + "-"))
    .sort((a,b) => {
      let na = parseInt((a.match(/-(\d+)\./) || [0,0])[1], 10)
      let nb = parseInt((b.match(/-(\d+)\./) || [0,0])[1], 10)
      return na - nb
    })

  files.forEach(file => {
    let src = getGroup(file)
    if(src){
      html += `<img loading="lazy" src="${src}" onclick="zoom(this)" onerror="handleImageError(this)">`
    }
  })

  modal2Images.innerHTML = html || `<div class="placeholderText">No additional pictures available.</div>`
  modal2.style.display = "block"
}

function openGallery(){

  let files = Object.keys(imageIndex.group || {})
    .filter(file => file.startsWith("group-"))
    .sort((a,b) => {
      let na = parseInt((a.match(/group-(\d+)\./) || [0,0])[1], 10)
      let nb = parseInt((b.match(/group-(\d+)\./) || [0,0])[1], 10)
      return na - nb
    })

  let html=""

  files.forEach(file => {
    html += `<img loading="lazy" src="${getGroup(file)}" onclick="zoom(this)" onerror="handleImageError(this)">`
  })

  galleryGrid.innerHTML=html || `<div class="placeholderText">No gallery pictures available.</div>`

  galleryModal.style.display="block"

}

function closeGallery(){
  galleryModal.style.display="none"
}

function zoom(img){

  if(!img || !img.src) return

  zoomImg.src=img.src

  zoomViewer.style.display="flex"

}

function closeZoom(){

  zoomViewer.style.display="none"

}

window.onclick=function(e){

  if(e.target.classList.contains("modal"))
    e.target.style.display="none"

}

loadData()

</script>
</script>

</body>
</html>
