<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
img-src 'self' https://drive.google.com https://*.googleusercontent.com https://*.usercontent.google.com data:;
style-src 'self' 'unsafe-inline';
script-src 'self' 'unsafe-inline';
connect-src https://script.google.com https://script.googleusercontent.com;
">
<title>CEG 1977 Batch Golden Jubilee</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family:Arial,Helvetica;
font-size:14px;
margin:15px;
}

header{
display:flex;
flex-wrap:wrap;
align-items:center;
gap:10px;
border-bottom:1px solid #ccc;
padding-bottom:10px;
}

header img{height:70px}

h1{margin:0;font-size:22px}

button{
background:#4a6fa5;
color:white;
border:none;
padding:10px 16px;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:disabled{opacity:.5}

#search{
margin-left:auto;
padding:6px;
font-size:15px;
width:240px;
}

#filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
align-items:center;
}

#tableView{
overflow-x:auto;
}
  
select{
background:#4a6fa5;
color:white;
border:none;
padding:8px;
font-size:16px;
height:36px;
}

#recordCount{margin-left:auto}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

thead{
background:#f1f5f9;
position:sticky;
top:0;
}
  
.cardGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(270px, 270px));
  gap:18px;
  justify-content:start;
  align-content:start;
}

.card{
  width:270px;
  display:flex;
  flex-direction:column;
  background:#fff;
  border-radius:12px;
  border:1px solid #d8d8d8;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
  overflow:hidden;
  padding:12px;
  min-height:320px;
  box-sizing:border-box;
  transition:box-shadow .2s ease, transform .2s ease;
}

.card:hover{
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
  transform:translateY(-2px);
}

@media (max-width: 640px){
  .cardGrid{
    grid-template-columns:1fr;
    justify-content:center;
  }

  .card{
    width:min(100%, 420px);
    margin:0 auto;
  }
}

/* Images row */

.cardImages{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:6px;
  margin-bottom:12px;
  flex:0 0 auto;
}

/* Individual image box */

.cardImgBox{
  width:100%;
  aspect-ratio:1/1;
  min-height:78px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  border-radius:6px;
  box-sizing:border-box;
}

.cardImgBox:empty{
  background:#fafafa;
  border:1px solid #eee;
}
.cardImgBox img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center top;
  display:block;
}

  
/* Card body */

.cardBody{
  display:flex;
  flex-direction:column;
  flex:1;
  min-width:0;
}

/* Name */

.cardName{
  font-weight:700;
  font-size:16px;
  line-height:1.3;
  margin-bottom:6px;
  min-height:42px;
  word-break:break-word;
  overflow-wrap:anywhere;
}

/* Metadata */

.cardMeta{
  font-size:14px;
  line-height:1.35;
  margin-bottom:4px;
  min-height:18px;
  word-break:break-word;
  overflow-wrap:anywhere;
}

/* Actions */

.cardActions{
  margin-top:auto;
  padding-top:12px;
}

.cardActions button{
  width:100%;
}
  
  .footer{
margin-top:12px;
display:flex;
gap:10px;
align-items:center;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
}

.modalContent{
background:white;
margin:20px auto;
padding:18px;
width:95%;
max-height:90%;
overflow:auto;
line-height:1.8;
}

.closeX{
float:right;
font-size:22px;
cursor:pointer;
}

.galleryGrid{
display:flex;
flex-wrap:wrap;
gap:12px;
align-items:flex-start;
}

.galleryGrid img{
height:auto;
width:auto;
align-self:flex-start;
}

.zoomViewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
align-items:center;
justify-content:center;
}

.zoomViewer img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<header>

<img id="headerImage">

<h1>CEG 1977 Batch Golden Jubilee</h1>

<button onclick="openGallery()">Gallery</button>

<input id="search" placeholder="Search directory">

</header>

<div id="loadingMessage">Loading alumni directory...</div>

<div id="filters" style="display:none">

<select id="branchFilter"></select>
<select id="monthFilter"></select>
<select id="alphaFilter"></select>

<button onclick="clearFilters()">Clear Filters</button>

<button id="viewBtn" onclick="toggleView()">Show Card View</button>

<div id="recordCount"></div>

</div>

<div id="tableView" style="display:none"></div>
<div id="cardView"></div>

<div class="footer">

<select id="pageSize">
<option>10</option>
<option>25</option>
<option>50</option>
<option>100</option>
</select>

<button id="prevBtn" onclick="prevPage()">Prev</button>

<span id="pageInfo"></span>

<button id="nextBtn" onclick="nextPage()">Next</button>

</div>

<!-- Modal 1 -->

<div id="modal1" class="modal">
<div class="modalContent">

<span class="closeX" onclick="modal1.style.display='none'">×</span>

<div id="modalImages"></div>

<div id="modalDetails"></div>

<div style="margin-top:12px">

<button id="moreBtn">View More Pictures</button>
<button onclick="modal1.style.display='none'">Close</button>

</div>

</div>
</div>

<!-- Modal 2 -->

<div id="modal2" class="modal">

<div class="modalContent">

<span class="closeX" onclick="modal2.style.display='none'">×</span>

<div id="modal2Images" class="galleryGrid"></div>

<button onclick="modal2.style.display='none'">Close</button>

</div>

</div>

<!-- Gallery -->

<div id="galleryModal" class="modal">

<div class="modalContent">

<span class="closeX" onclick="closeGallery()">×</span>

<h3>Gallery</h3>

<div id="galleryGrid" class="galleryGrid"></div>

<button onclick="closeGallery()">Close</button>

</div>

</div>

<!-- Image Zoom -->

<div id="zoomViewer" class="zoomViewer" onclick="closeZoom()">
<img id="zoomImg">
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzScXIj_0DCDACS29_dGGHj8O36vojdCt_cDqdVvCrB4w3rghvhrr-Z571lRRx7nqCD_g/exec"

let imageIndex = {
  individual: {},
  group: {}
}

let data = []
let filtered = []
let page = 1
let cardMode = true

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;")
}

function encodeName(n){
  return encodeURIComponent(n)
}

function formatDOB(v){
  if(!v) return ""

  let d = new Date(v)
  if(isNaN(d)) return v

  let dd = ("0" + d.getDate()).slice(-2)
  let m = months[d.getMonth()]

  return dd + "-" + m
}

async function loadImageIndex(){
  try{
    const res = await fetch(API_URL + "?action=images")
    const text = await res.text()
    console.log("images raw response:", text)
    imageIndex = JSON.parse(text)
    console.log("imageIndex loaded:", imageIndex)
  }catch(e){
    console.error("loadImageIndex failed:", e)
  }
}

function prepareData(rows){
  return rows.map(r => {
    let searchText = Object.values(r)
      .filter(v => v !== null && v !== undefined)
      .join(" ")
      .toLowerCase()

    return {
      ...r,
      _searchText: searchText
    }
  })
}

  function attachPrimaryImageUrls(rows){
  return rows.map(r => {
    let name = encodeName(r.Name || "")

    return {
      ...r,
      _img1977: getIndividual(`${name}-1977.jpeg`),
      _img2020: getIndividual(`${name}-2020.jpeg`),
      _img2027: getIndividual(`${name}-2027.jpeg`)
    }
  })
}

  
async function loadData(){
  await loadImageIndex()
  console.log("after loadImageIndex:", imageIndex)

  if(typeof headerImage !== "undefined" && headerImage){
    headerImage.src = getGroup("college-1.jpeg")
  }

  let cached = localStorage.getItem("ceg1977data")

if(cached){
  data = attachPrimaryImageUrls(prepareData(JSON.parse(cached)))
  filtered = [...data]
  buildFilters(data)
  loadingMessage.style.display = "none"
  filters.style.display = "flex"
  render()
  preloadVisiblePageImages()
  preloadNextPageImages()
  return
}


  try{
    let res = await fetch(API_URL + "?action=data")
    let fresh = await res.json()
    
    data = attachPrimaryImageUrls(prepareData(fresh))
    filtered = [...data]
    
    localStorage.setItem("ceg1977data", JSON.stringify(fresh))
    
    buildFilters(data)
    loadingMessage.style.display = "none"
    filters.style.display = "flex"
    
    render()
    preloadVisiblePageImages()
    preloadNextPageImages()

  }catch(e){
    console.error(e)
    loadingMessage.innerText = "Unable to load directory"
  }
}

function scrollToTop(){
  window.scrollTo({top:0, behavior:"smooth"})
}

function buildFilters(source = data){
  const currentBranch = branchFilter.value || "ALL"
  const currentMonth = monthFilter.value || "ALL"
  const currentAlpha = alphaFilter.value || "ALL"

  let branches = [...new Set(
    source.map(x => (x.Branch || "").trim()).filter(Boolean)
  )].sort()

  branchFilter.innerHTML = "<option value='ALL'>Branch</option>"
  branches.forEach(b => {
    branchFilter.innerHTML += `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`
  })

  let monthValues = [...new Set(
    source.map(x => {
      let dob = new Date(x.Date_of_birth)
      return isNaN(dob) ? "" : months[dob.getMonth()]
    }).filter(Boolean)
  )]

  monthFilter.innerHTML = "<option value='ALL'>DOB Jan-Dec</option>"
  months.forEach(m => {
    if(monthValues.includes(m)){
      monthFilter.innerHTML += `<option value="${m}">${m}</option>`
    }
  })

  let letters = [...new Set(
    source.map(x => (x.Name || "").trim().charAt(0).toUpperCase()).filter(Boolean)
  )].sort()

  alphaFilter.innerHTML = "<option value='ALL'>Name A - Z</option>"
  letters.forEach(a => {
    alphaFilter.innerHTML += `<option value="${a}">${a}</option>`
  })

  if([...branchFilter.options].some(o => o.value === currentBranch)) branchFilter.value = currentBranch
  else branchFilter.value = "ALL"

  if([...monthFilter.options].some(o => o.value === currentMonth)) monthFilter.value = currentMonth
  else monthFilter.value = "ALL"

  if([...alphaFilter.options].some(o => o.value === currentAlpha)) alphaFilter.value = currentAlpha
  else alphaFilter.value = "ALL"
}

function rebuildBranchFilter(source){
  const currentBranch = branchFilter.value || "ALL"

  let branches = [...new Set(
    source.map(x => (x.Branch || "").trim()).filter(Boolean)
  )].sort()

  branchFilter.innerHTML = "<option value='ALL'>Branch</option>"
  branches.forEach(b => {
    branchFilter.innerHTML += `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`
  })

  if([...branchFilter.options].some(o => o.value === currentBranch)) branchFilter.value = currentBranch
  else branchFilter.value = "ALL"
}

function rebuildMonthFilter(source){
  const currentMonth = monthFilter.value || "ALL"

  let monthValues = [...new Set(
    source.map(x => {
      let dob = new Date(x.Date_of_birth)
      return isNaN(dob) ? "" : months[dob.getMonth()]
    }).filter(Boolean)
  )]

  monthFilter.innerHTML = "<option value='ALL'>DOB Jan-Dec</option>"
  months.forEach(m => {
    if(monthValues.includes(m)){
      monthFilter.innerHTML += `<option value="${m}">${m}</option>`
    }
  })

  if([...monthFilter.options].some(o => o.value === currentMonth)) monthFilter.value = currentMonth
  else monthFilter.value = "ALL"
}

function rebuildAlphaFilter(source){
  const currentAlpha = alphaFilter.value || "ALL"

  let letters = [...new Set(
    source.map(x => (x.Name || "").trim().charAt(0).toUpperCase()).filter(Boolean)
  )].sort()

  alphaFilter.innerHTML = "<option value='ALL'>Name A - Z</option>"
  letters.forEach(a => {
    alphaFilter.innerHTML += `<option value="${a}">${a}</option>`
  })

  if([...alphaFilter.options].some(o => o.value === currentAlpha)) alphaFilter.value = currentAlpha
  else alphaFilter.value = "ALL"
}

  
function applyFilters(changedFilter = ""){
  console.log("applyFilters called")
  let b = branchFilter.value
  let m = monthFilter.value
  let a = alphaFilter.value
  let s = search.value.toLowerCase()

function matchesSearch(d){
  return !s || (d._searchText || "").includes(s)
}


  function getMonthValue(d){
    let dob = new Date(d.Date_of_birth)
    return isNaN(dob) ? "" : months[dob.getMonth()]
  }

  function getAlphaValue(d){
    return (d.Name || "").trim().charAt(0).toUpperCase()
  }

  // Final filtered result
  filtered = data.filter(d => {
    let mmm = getMonthValue(d)
    let firstLetter = getAlphaValue(d)

    if(b !== "ALL" && d.Branch !== b) return false
    if(m !== "ALL" && mmm !== m) return false
    if(a !== "ALL" && firstLetter !== a) return false
    if(!matchesSearch(d)) return false

    return true
  })

  // Cascading filter sources:
  // each dropdown is built from data filtered by the OTHER active filters
  let branchSource = data.filter(d => {
    let mmm = getMonthValue(d)
    let firstLetter = getAlphaValue(d)

    if(m !== "ALL" && mmm !== m) return false
    if(a !== "ALL" && firstLetter !== a) return false
    if(!matchesSearch(d)) return false

    return true
  })

  let monthSource = data.filter(d => {
    let firstLetter = getAlphaValue(d)

    if(b !== "ALL" && d.Branch !== b) return false
    if(a !== "ALL" && firstLetter !== a) return false
    if(!matchesSearch(d)) return false

    return true
  })

  let alphaSource = data.filter(d => {
    let mmm = getMonthValue(d)

    if(b !== "ALL" && d.Branch !== b) return false
    if(m !== "ALL" && mmm !== m) return false
    if(!matchesSearch(d)) return false

    return true
  })

  rebuildBranchFilter(branchSource)
  rebuildMonthFilter(monthSource)
  rebuildAlphaFilter(alphaSource)

  page = 1
  render()
  
}

function clearFilters(){
  search.value = ""
  branchFilter.value = "ALL"
  monthFilter.value = "ALL"
  alphaFilter.value = "ALL"
  filtered = [...data]
  buildFilters(data)
  page = 1
  render()
}



function pageSize(){
  return parseInt(document.getElementById("pageSize").options[
    document.getElementById("pageSize").selectedIndex
  ].value)
}

document.getElementById("pageSize").onchange = function(){
  page = 1
  render()
  scrollToTop()
}

function paginate(){
  let start = (page - 1) * pageSize()
  return filtered.slice(start, start + pageSize())
}

function render(){
  recordCount.innerText = filtered.length + " records"
  viewBtn.innerText = cardMode ? "Show Table View" : "Show Card View"

  if(cardMode) renderCards()
  else renderTable()

  updatePagination()

  preloadVisiblePageImages()
  preloadNextPageImages()
}


function renderTable(){
  let rows = paginate()

  let html = "<table><thead><tr><th>Name</th><th>Branch</th><th>DOB</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead><tbody>"

  rows.forEach((r,i) => {
    let idx = (page - 1) * pageSize() + i

    html += `
    <tr>
      <td>${r.Name}</td>
      <td>${r.Branch}</td>
      <td>${formatDOB(r.Date_of_birth)}</td>
      <td>${r.Email_address || ""}</td>
      <td>${r.Phone_numbers || ""}</td>
      <td><button onclick="showDetails(${idx})">View Details</button></td>
    </tr>
    `
  })

  html += "</tbody></table>"
  tableView.innerHTML = html
}


function renderCards(){

  const rows = paginate();
  let html = "<div class='cardGrid'>";

  rows.forEach((r,i)=>{

    const idx = (page - 1) * pageSize() + i;

    const name   = r.Name || "&nbsp;";
    const branch = r.Branch || "&nbsp;";
    const dob    = formatDOB(r.Date_of_birth) || "&nbsp;";
    const email  = r.Email_address || "&nbsp;";
    const phone  = r.Phone_numbers || "&nbsp;";

    html += `
    <div class="card">

      <div class="cardImages">

        <div class="cardImgBox">
          ${r._img1977 ? `
          <img loading="lazy" decoding="async"
               src="${r._img1977}"
               onclick="zoom(this)"
               onerror="this.remove()">
          ` : ""}
        </div>

        <div class="cardImgBox">
          ${r._img2020 ? `
          <img loading="lazy" decoding="async"
               src="${r._img2020}"
               onclick="zoom(this)"
               onerror="this.remove()">
          ` : ""}
        </div>

        <div class="cardImgBox">
          ${r._img2027 ? `
          <img loading="lazy" decoding="async"
               src="${r._img2027}"
               onclick="zoom(this)"
               onerror="this.remove()">
          ` : ""}
        </div>

      </div>

      <div class="cardBody">
        <div class="cardName">${name}</div>
        <div class="cardMeta">${branch}</div>
        <div class="cardMeta">${dob}</div>
        <div class="cardMeta">${email}</div>
        <div class="cardMeta">${phone}</div>

        <div class="cardActions">
          <button onclick="showDetails(${idx})">View Details</button>
        </div>
      </div>

    </div>
    `;
  });

  html += "</div>";
  cardView.innerHTML = html;
}
  
function toggleView(){
  cardMode = !cardMode

  tableView.style.display = cardMode ? "none" : "block"
  cardView.style.display = cardMode ? "block" : "none"

  viewBtn.innerText = cardMode ? "Show Table View" : "Show Card View"

  render()
}

function updatePagination(){
  let total = Math.ceil(filtered.length / pageSize())

  pageInfo.innerText = "Page " + page + " / " + (total || 1)

  prevBtn.disabled = (page === 1)
  nextBtn.disabled = (page === total || total === 0)
}

function prevPage(){
  if(page > 1){
    page--
    render()
    scrollToTop()
  }
}

function nextPage(){
  let total = Math.ceil(filtered.length / pageSize())

  if(page < total){
    page++
    render()
    scrollToTop()
  }
}

function getIndividual(file){
  if(!imageIndex || !imageIndex.individual) return ""

  let decoded = decodeURIComponent(file)
  let id = imageIndex.individual[decoded]

  if(!id) return ""

  return "https://drive.google.com/thumbnail?id=" + id + "&sz=w800"
}

function getGroup(file){
  if(!imageIndex || !imageIndex.group) return ""

  let decoded = decodeURIComponent(file)
  let id = imageIndex.group[decoded]

  if(!id) return ""

  return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000"
}

function preloadImage(src){
  if(!src) return
  const img = new Image()
  img.decoding = "async"
  img.src = src
}

function preloadRecordImages(r){
  if(!r) return

  preloadImage(r._img1977 || "")
  preloadImage(r._img2020 || "")
  preloadImage(r._img2027 || "")
}


function preloadVisiblePageImages(){
  let rows = paginate()
  rows.forEach(r => preloadRecordImages(r))
}

function preloadNextPageImages(){
  let start = page * pageSize()
  let nextRows = filtered.slice(start, start + pageSize())
  nextRows.forEach(r => preloadRecordImages(r))
}

  
function showDetails(i){
  let r = filtered[i]
  if(!r) return

  let name = encodeName(r.Name || "")

  let img1 = r._img1977 || ""
  let img2 = r._img2020 || ""
  let img3 = r._img2027 || ""

  let modalImgsHTML = ""

  if(img1) modalImgsHTML += `<img loading="lazy" decoding="async" src="${img1}" onclick="zoom(this)" onerror="this.style.display='none'">`
  if(img2) modalImgsHTML += `<img loading="lazy" decoding="async" src="${img2}" onclick="zoom(this)" onerror="this.style.display='none'">`
  if(img3) modalImgsHTML += `<img loading="lazy" decoding="async" src="${img3}" onclick="zoom(this)" onerror="this.style.display='none'">`

  modalImages.innerHTML = modalImgsHTML

  let html = ""

  for(let k in r){
    if(k.startsWith("_")) continue

    let value = r[k] || ""

    if(k === "Date_of_birth" || k === "Anniversary_date"){
      value = formatDOB(value)
    }

    html += `<b>${escapeHtml(k)}</b>: ${escapeHtml(value)}<br>`
  }

  modalDetails.innerHTML = html

  let hasMorePics = false
  let decodedName = decodeURIComponent(name)

  if(imageIndex && imageIndex.group){
    for(let file in imageIndex.group){
      if(file.startsWith(decodedName + "-")){
        hasMorePics = true
        break
      }
    }
  }

  moreBtn.style.display = hasMorePics ? "inline-block" : "none"
  moreBtn.onclick = function(){ openMorePics(name) }

  modal1.style.display = "block"
}

  function openMorePics(name){
  let decodedName = decodeURIComponent(name)
  let html = ""

  if(!imageIndex || !imageIndex.group){
    modal2Images.innerHTML = ""
    modal2.style.display = "block"
    return
  }

  for(let file in imageIndex.group){
    if(file.startsWith(decodedName + "-")){
      let src = getGroup(file)
      if(src){
        html += `<img loading="lazy" decoding="async" src="${src}" onclick="zoom(this)" onerror="this.style.display='none'">`
      }
    }
  }

  modal2Images.innerHTML = html
  modal2.style.display = "block"
}

function openGallery(){
  let html = ""

  for(let file in imageIndex.group){
    if(file.startsWith("group-")){
      html += `<img loading="lazy" decoding="async" src="${getGroup(file)}" onclick="zoom(this)">`
    }
  }

  galleryGrid.innerHTML = html
  galleryModal.style.display = "block"
}

function closeGallery(){
  galleryModal.style.display = "none"
}

function zoom(img){
  zoomImg.src = img.src
  zoomViewer.style.display = "flex"
}

function closeZoom(){
  zoomViewer.style.display = "none"
}

window.onclick = function(e){
  if(e.target.classList.contains("modal")){
    e.target.style.display = "none"
  }
}

window.addEventListener("DOMContentLoaded", () => {
  branchFilter.onchange = () => applyFilters("branch")
  monthFilter.onchange = () => applyFilters("month")
  alphaFilter.onchange = () => applyFilters("alpha")
  search.oninput = () => applyFilters("search")
})

  
loadData()
</script>
